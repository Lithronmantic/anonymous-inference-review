profile: default_eswa_retry5_16f_scaled_ratio25
# ============================================================
# 25% labeled variant of default_eswa_retry5_16f_scaled.
#
# Identical to default_eswa_retry5_16f_scaled.yaml, except the
# labeled / unlabeled CSV paths are switched to the 25% split.
# Keep this file in lockstep with the 50% one for any future change.
# ============================================================
seed: 42

data:
  data_root: ""
  labeled_csv: "./train_labeled.csv"
  val_csv: "./val.csv"
  unlabeled_csv: "./train_unlabeled.csv"
  meta_val_csv: "./meta_val.csv"
  num_classes: 12
  class_names:
    - "Good"
    - "Excessive Penetration"
    - "Porosity w/Excessive Penetration"
    - "Porosity"
    - "Burnthrough"
    - "Lack of Fusion"
    - "Spatter"
    - "Warping"
    - "Undercut"
    - "Crater Cracks"
    - "Overlap"
    - "Excessive Convexity"
  sampler: "weighted"
  nominal_fps: 30
  split_ratio: "5:3:2"
  num_workers_train: 4
  num_workers_val: 0
  num_workers_unl: 4

video:
  num_frames: 16
  size: 224
  fps: 30

audio:
  sample_rate: 16000
  n_fft: 1024
  hop_length: 256
  n_mels: 80

model:
  video_backbone:
    name: "resnet18"
    weights: ""
    frozen_stages: 0
    out_dim: 512
  audio_backbone:
    name: "light_vggish"
    weights: ""
    frozen_stages: 0
    out_dim: 128
  fusion:
    type: "coattn"
    d_model: 256
    num_layers: 2
    num_heads: 8
    dropout: 0.1
  mil:
    topk_ratio: 0.15
    attn_temp: 0.9
    dropout: 0.3
  init_bias: true
  use_aux_heads: true

cava:
  enabled: true
  tau_nce: 0.07
  delta_low_frames: -8.0
  delta_high_frames: 14.0
  delta_prior: 6.0
  dist_max_delay: 15
  window_size: 4
  mask_type: "gaussian"
  multi_scale: false
  negative_mode: "intra_sequence_all"
  eq7_negative_definition: "strict"
  temporal_exclusion_radius: 0
  gate_range_mode: "strict"
  gate_range: [0.05, 0.95]
  gate_target: 0.5
  lambda_cava: 0.01
  lambda_align: 0.01
  lambda_edge: 0.005
  lambda_prior: 0.005
  lambda_gate: 0.005
  edge_margin_ratio: 0.25

mlpr:
  enabled: true
  feature_mode: "extended_7d"
  inner_lr: 0.01
  inner_lr_alpha: 0.01
  use_history_stats: true
  use_cava_signal: true
  use_prob_vector: false
  weight_clip: [0.05, 0.95]
  meta_lr: 1.0e-4
  meta_interval: 10

loss:
  name: "ce"
  label_smoothing: 0.1
  class_weights: null

training:
  use_ssl: true
  amp: true
  batch_size: 128
  runtime_batch_size: 64
  num_epochs: 30
  learning_rate: 1.0e-4
  backbone_lr_mult: 0.05
  weight_decay: 1.0e-3
  grad_clip_norm: 1.0
  early_stop_patience: 15
  ssl_method: ours_mlpr
  ssl:
    ema_decay_init: 0.95
    ema_decay_base: 0.95
    ema_momentum: 0.95
    warmup_epochs: 2
    final_thresh: 0.40
    consistency_temp: 1.0
    lambda_u: 1.0
    use_dist_align: true

optimizer:
  name: "adamw"
  lr: 1.0e-4
  weight_decay: 1.0e-3

evaluation:
  metrics: ["accuracy", "macro_f1", "macro_auc"]
  save_best_by: "macro_f1"
